version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: yojanasaathi-postgres
    environment:
      POSTGRES_DB: yojanasaathi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - yojanasaathi-network

  mongodb:
    image: mongo:6
    container_name: yojanasaathi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - yojanasaathi-network

  redis:
    image: redis:7-alpine
    container_name: yojanasaathi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - yojanasaathi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yojanasaathi-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_NAME: yojanasaathi
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - yojanasaathi-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: yojanasaathi-ai
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/yojanasaathi
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
    networks:
      - yojanasaathi-network
    volumes:
      - ./ai-services:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yojanasaathi-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_AI_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - yojanasaathi-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  yojanasaathi-network:
    driver: bridge
